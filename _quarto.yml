project:
  type: book
  output-dir: _book

book:
  title: "Toolkit de Evaluación de Impacto"
  subtitle: "Guía práctica para programas sociales"
  author:
    - name: "Andrés Despada"
    - name: "Nayith Mosquera"
  date: today
  date-format: "MMMM YYYY"
  language: es

  search: true
  repo-url: "https://github.com/adespada/ImpactEvaluation_Toolkit"
  repo-actions: [edit, issue]

  sidebar:
    style: docked
    search: true
    collapse-level: 2

  chapters:
    - index.qmd

    - part: "PARTE 0 — Contexto y fundamentos"
      chapters:
        - capitulos/00-bienvenida.qmd
        - capitulos/00-que-es-evaluacion.qmd
        - capitulos/00-teoria-de-cambio.qmd

    - part: "PARTE 1 — Sistemas de monitoreo"
      chapters:
        - capitulos/01-marco-logico.qmd
        - capitulos/01-recoleccion-datos.qmd
        - capitulos/01-linea-base.qmd
        - capitulos/01-monitoreo-a-evaluacion.qmd

    - part: "PARTE 2 — Herramienta de autodiagnóstico"
      chapters:
        - capitulos/02-autodiagnostico.qmd

    - part: "PARTE 3 — Métodos cuantitativos"
      chapters:
        - capitulos/03-intro-cuantitativa.qmd
        - capitulos/03-rct.qmd
        - capitulos/03-did.qmd
        - capitulos/03-matching.qmd
        - capitulos/03-iv.qmd
        - capitulos/03-rdd.qmd
        - capitulos/03-poder-muestra.qmd

    - part: "PARTE 4 — Métodos cualitativos"
      chapters:
        - capitulos/04-intro-cualitativa.qmd
        - capitulos/04-systems-mapping.qmd
        - capitulos/04-outcome-mapping.qmd
        - capitulos/04-outcome-harvesting.qmd
        - capitulos/04-contribution-analysis.qmd
        - capitulos/04-process-tracing.qmd
        - capitulos/04-qca.qmd
        - capitulos/04-quip.qmd

    - part: "PARTE 5 — Métodos mixtos"
      chapters:
        - capitulos/05-por-que-combinar.qmd
        - capitulos/05-disenos-mixtos.qmd
        - capitulos/05-casos-estudio.qmd

    - part: "PARTE 6 — Cómo hablar con la IA"
      chapters:
        - capitulos/06-guia-ia.qmd

    - part: "PARTE 7 — Anexos de código"
      chapters:
        - capitulos/anexo-codigo-rct.qmd
        - capitulos/anexo-codigo-did.qmd
        - capitulos/anexo-codigo-matching.qmd
        - capitulos/anexo-codigo-iv.qmd
        - capitulos/anexo-codigo-rdd.qmd
        - capitulos/anexo-codigo-poder.qmd

    - part: "PARTE 8 — Recursos"
      chapters:
        - capitulos/08-glosario.qmd
        - capitulos/08-plantillas.qmd
        - capitulos/08-etica.qmd
        - capitulos/08-bibliografia.qmd

  appendices:
    - capitulos/08-tabla-resumen-metodos.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 3
    code-fold: true
    code-summary: "Mostrar código R"
    code-tools: true
    code-copy: true
    code-line-numbers: true
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    embed-resources: false

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

lang: es

crossref:
  fig-title: "Figura"
  tbl-title: "Tabla"
  eq-prefix: "Ecuación"
  sec-prefix: "Sección"
  fig-prefix: "Figura"
  tbl-prefix: "Tabla"

knitr:
  opts_chunk:
    comment: "#>"
    fig.width: 7
    fig.height: 5
    fig.align: "center"
    out.width: "90%"
